apiVersion: v1
kind: Pod
metadata:
  name: pytorch-benchmark
spec:
  restartPolicy: Never
  tolerations:
  - key: sku
    operator: Equal
    value: gpu
    effect: NoSchedule
  containers:
  - name: pytorch
    image: pytorch/pytorch:2.1.0-cuda12.1-cudnn8-runtime
    resources:
      limits:
        nvidia.com/gpu: 1
    command: [python3, -c]
    args:
    - |
      import torch, time
      device = torch.device('cuda')
      print("Warming up...")
      N = 4096
      a = torch.randn(N, N, dtype=torch.float16, device=device)
      b = torch.randn(N, N, dtype=torch.float16, device=device)
      print("Running sustained load for 3 minutes...")
      end_time = time.time() + 180
      count = 0
      while time.time() < end_time:
          c = torch.matmul(a, b)
          count += 1
      torch.cuda.synchronize()
      print(f"Done. Ran {count} matmuls.")